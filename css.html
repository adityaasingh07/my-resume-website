<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSS Types Example</title>

    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">

    <!-- Internal CSS -->
    <style>
        h2{
            color: green;
            text-align: center;
        }
    </style>

</head>
<body>

    <!-- Inline CSS -->
    <h1 style="color: red; text-align: center;">
        This is H1 (Inline CSS)
    </h1>

    <!-- Internal CSS -->
    <h2>
        This is H2 (Internal CSS)
    </h2>

    <!-- External CSS -->
    <h3>
        This is H3 (External CSS)
    </h3>

</body>
</html>
